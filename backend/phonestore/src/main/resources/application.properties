# Profile configuration - activate production profile on Railway
spring.profiles.active=${RAILWAY_ENVIRONMENT:dev}

# Common configurations
spring.application.name=phonestore

# Development-only configurations (will be overridden by application-prod.properties in production)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/phonestore
spring.datasource.username=root
spring.datasource.password=

# Development logging
logging.level.com.ciro.phonestore=DEBUG
logging.level.org.springframework.security=INFO

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${user.home}/phonestore/firmware-uploads

# Development JPA settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Development CORS settings
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Enable HTTP methods like PUT and DELETE from forms
spring.mvc.hiddenmethod.filter.enabled=true

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
spring.main.allow-bean-definition-overriding=true
