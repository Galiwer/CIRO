# Server configuration
server.port=${PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Database configuration with optimized settings
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool configuration - adjusted for stability
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.register-mbeans=false

# JPA/Hibernate configuration - optimized for transactions
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.connection.release_mode=after_transaction

# Transaction configuration
spring.transaction.default-timeout=30s

# Logging configuration
logging.level.root=WARN
logging.level.com.ciro.phonestore=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File upload configuration - increased for better image handling
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=4MB
spring.servlet.multipart.enabled=true

# JWT configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# Server compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,image/jpeg,image/png
server.compression.min-response-size=1024

# Tomcat configuration - adjusted for better performance
server.tomcat.max-threads=10
server.tomcat.min-spare-threads=2
server.tomcat.max-connections=50
server.tomcat.accept-count=20
server.tomcat.connection-timeout=10000

# Enable database initialization
spring.sql.init.mode=never

# Cache configuration - increased for better image caching
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=1800s

# Cache Configuration
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.chain.cache=true
spring.web.resources.chain.enabled=true
spring.web.resources.cache.cachecontrol.no-cache=false
spring.web.resources.cache.cachecontrol.must-revalidate=false

# Disable Thymeleaf cache in production
spring.thymeleaf.cache=true

# Disable DevTools in production
spring.devtools.add-properties=false
spring.devtools.restart.enabled=false

# File Storage Configuration - using user home directory
app.upload.dir=${user.home}/phonestore/firmware-uploads

# Additional firmware endpoints security
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always 